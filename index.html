<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعم Zimax</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>دعم Zimax</h1>
        <p>اكتب بياناتك لتأكيد دعمك</p>
        <form id="zimaxForm">
            <input type="text" id="name" placeholder="اسمك" required>
            <input type="tel" id="phone" placeholder="رقم التليفون" required>
            <button type="submit">تأكيد الدعم</button>
        </form>
        <div id="message"></div>
    </div>

    <!-- EmailJS SDK -->
    <script src="https://cdn.emailjs.com/sdk/3.2.0/email.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
