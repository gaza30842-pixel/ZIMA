<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم لـ Zimax | Ziroxoft</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <div class="container">
        <h2>انضم لفريق Zimax</h2>
        <p>ابني مستقبلك مع Ziroxoft</p>
        
        <form id="supportForm">
            <input type="text" id="userName" placeholder="الاسم الكامل" required>
            
            <input type="tel" id="userPhone" placeholder="رقم الهاتف (واتساب)" required>
            
            <input type="text" id="userJob" placeholder="أنت بتعرف تشتغل إيه على النت؟" required>
            
            <button type="submit" id="submitBtn">إرسال البيانات</button>
        </form>
        
        <div id="responseMessage"></div>
    </div>

    <script src="Script.js"></script>
</body>
</html>
